name: SuperNova-RV CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: LINTING
  # ==========================================
  rtl-linting:
    name: Verible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Cache Verible
        id: cache-verible
        uses: actions/cache@v4
        with:
          path: verible-bin
          key: ${{ runner.os }}-verible-latest

      - name: Instalar Verible (se necessário)
        if: steps.cache-verible.outputs.cache-hit != 'true'
        run: |
          wget $(curl -s https://api.github.com/repos/chipsalliance/verible/releases/latest | grep browser_download_url | grep linux-static-x86_64.tar.gz | cut -d '"' -f 4) -O verible.tar.gz
          mkdir verible-bin
          tar -xzf verible.tar.gz -C verible-bin --strip-components=1

      - name: Add Verible to PATH
        run: echo "$PWD/verible-bin/bin" >> $GITHUB_PATH

      - name: Executar Linter
        run: make lint

  # ==========================================
  # JOB 2: SIMULAÇÃO (com container)
  # ==========================================
  rtl-simulation:
    name: Verilator Tests
    runs-on: ubuntu-latest
    needs: rtl-linting

    container:
      image: verilator/verilator:latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Garantir Python
      run: |
        apt-get update
        apt-get install -y python3 python3-pip python3-venv

    - name: Criar ambiente Python
      run: |
        python3 -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install -r requirements.txt

    - name: Executar testes inteligentes
      run: .venv/bin/python scripts/smart_test.py