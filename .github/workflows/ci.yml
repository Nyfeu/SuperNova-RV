name: SuperNova-RV CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'hw/**'       
      - 'tb/**'       
      - 'scripts/**'  
      - 'makefile'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'hw/**'
      - 'tb/**'
      - 'scripts/**'
      - 'makefile'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: LINTING (Rápido e Estrito)
  # ==========================================
  rtl-linting:
    name: Verible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Verible
        run: |
          wget $(curl -s https://api.github.com/repos/chipsalliance/verible/releases/latest | grep browser_download_url | grep linux-static-x86_64.tar.gz | cut -d '"' -f 4) -O verible.tar.gz
          tar -xzf verible.tar.gz
          sudo cp verible-*/bin/* /usr/local/bin/

      - name: Executar Linter
        # Se isso falhar (exit code != 0), o pipeline inteiro para aqui.
        run: make lint

  # ==========================================
  # JOB 2: SIMULAÇÃO INTELIGENTE
  # ==========================================
  rtl-simulation:
    name: Verilator Tests
    runs-on: ubuntu-latest
    needs: rtl-linting # Só roda se o linting passar.
    
    steps:
      - name: Checkout do código (com histórico completo para o diff)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Necessário para o git diff funcionar corretamente

      - name: Instalar Dependências (Verilator, Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator python3 python3-pip

      - name: Executar Script de Teste Inteligente
        run: python3 scripts/smart_test.py