name: SuperNova-RV CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 0: CONTROLADOR DE TRÁFEGO (Paths Filter)
  # ==========================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      hardware: ${{ steps.filter.outputs.hardware }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hardware:
              - 'hw/**'
              - 'tb/**'
              - 'sw/**'
              - 'scripts/**'
              - 'makefile'
              - 'supernova_pkg.sv'
              - '.github/workflows/ci.yml'

  # ==========================================
  # JOB 1: LINTING
  # ==========================================
  rtl-linting:
    name: Verible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Cache Verible
        id: cache-verible
        uses: actions/cache@v4
        with:
          path: verible-bin
          # Mudamos a chave para v2. Isso força o GitHub a ignorar o cache antigo e baixar do zero.
          key: ${{ runner.os }}-verible-v2

      - name: Instalar Verible (se necessário)
        if: steps.cache-verible.outputs.cache-hit != 'true'
        run: |
          wget $(curl -s https://api.github.com/repos/chipsalliance/verible/releases/latest | grep browser_download_url | grep linux-static-x86_64.tar.gz | cut -d '"' -f 4) -O verible.tar.gz
          mkdir -p verible-bin
          tar -xzf verible.tar.gz -C verible-bin --strip-components=1

      - name: Configurar PATH e Executar Linter
        run: |
          # Usa o caminho absoluto garantido pelo GitHub
          echo "${{ github.workspace }}/verible-bin/bin" >> $GITHUB_PATH
          
          # Exporta localmente para este mesmo passo (o GITHUB_PATH só faz efeito no PRÓXIMO step)
          export PATH="${{ github.workspace }}/verible-bin/bin:$PATH"
          
          # Sanity check: Se isso falhar, o erro aparece antes do make
          verible-verilog-lint --version 
          
          make lint

  # ==========================================
  # JOB 2: SIMULAÇÃO (Unit & Integration)
  # ==========================================
  rtl-simulation:
    name: Verilator Tests
    runs-on: ubuntu-latest
    needs: [changes, rtl-linting]
    container:
      image: verilator/verilator:latest

    steps:
      - name: Bypass Message (If No HW Changes)
        if: ${{ needs.changes.outputs.hardware == 'false' }}
        run: echo "✅ Nenhuma alteração de hardware detectada. Simulação finalizada em bypass."

      - name: Checkout do código
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Executar testes inteligentes
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        run: |
          git config --global --add safe.directory '*' 
          apt-get update
          apt-get install -y python3 python3-pip python3-venv
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python scripts/smart_test.py

  # ==========================================
  # JOB 3: COMPLIANCE (RV32I E2E)
  # ==========================================
  compliance-verification:
    name: RV32I Compliance
    runs-on: ubuntu-latest
    needs: [changes, rtl-simulation]
    container:
      image: verilator/verilator:latest

    steps:
      - name: Bypass Message (If No HW Changes)
        if: ${{ needs.changes.outputs.hardware == 'false' }}
        run: echo "✅ Nenhuma alteração de hardware detectada. Compliance E2E finalizado em bypass."

      - name: Checkout do código
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        uses: actions/checkout@v4

      - name: Executar 100% Compliance Suite
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        run: |
          git config --global --add safe.directory '*'
          apt-get update
          apt-get install -y gcc-riscv64-unknown-elf make
          make test-compliance-all

      - name: Salvar Logs de Falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-error-traces
          path: traces/
          retention-days: 5