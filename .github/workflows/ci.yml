name: SuperNova-RV CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 0: CONTROLADOR DE TRÁFEGO (Paths Filter)
  # ==========================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      hardware: ${{ steps.filter.outputs.hardware }}
      run_compliance: ${{ steps.build-matrix.outputs.run_compliance }}
      matrix_cores: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hardware:
              - 'hw/**'
              - 'tb/**'
              - 'sw/**'
              - 'scripts/**'
              - 'makefile'
              - '.github/workflows/ci.yml'
            nebula:
              - 'hw/core/nebula/**'
              - 'tb/core/nebula/**'
              - 'sw/**'
              - 'scripts/**'
              - 'makefile'
              - '.github/workflows/ci.yml'
            protostar:
              - 'hw/core/protostar/**'
              - 'tb/core/protostar/**'
              - 'sw/**'
              - 'scripts/**'
              - 'makefile'
              - '.github/workflows/ci.yml'

      - name: Generate Compliance Matrix
        id: build-matrix
        run: |
          CORES=()
          # Adiciona à lista de testes se houve mudança na bolha de cada core (ou em arquivos comuns)
          if [[ "${{ steps.filter.outputs.nebula }}" == 'true' ]]; then CORES+=('"nebula"'); fi
          if [[ "${{ steps.filter.outputs.protostar }}" == 'true' ]]; then CORES+=('"protostar"'); fi
          
          # Formata o array do bash para um array JSON válido (ex: ["nebula", "protostar"])
          JSON_ARRAY="[$(IFS=,; echo "${CORES[*]}")]"
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          
          # Define uma flag para evitar erro se a matriz estiver vazia
          if [ ${#CORES[@]} -gt 0 ]; then
            echo "run_compliance=true" >> $GITHUB_OUTPUT
          else
            echo "run_compliance=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # JOB 1: LINTING (Verible)
  # ==========================================
  rtl-linting:
    name: Verible Lint
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Bypass Message (If No HW Changes)
        if: ${{ needs.changes.outputs.hardware == 'false' }}
        run: echo "✅ Nenhuma alteração de hardware detectada. Linter finalizado em bypass."

      - name: Checkout do código
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        uses: actions/checkout@v4

      - name: Cache Verible
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        id: cache-verible
        uses: actions/cache@v4
        with:
          path: verible-bin
          key: ${{ runner.os }}-verible-v2

      - name: Instalar Dependências (Verible)
        if: ${{ needs.changes.outputs.hardware == 'true' && steps.cache-verible.outputs.cache-hit != 'true' }}
        run: |
          wget $(curl -s https://api.github.com/repos/chipsalliance/verible/releases/latest | grep browser_download_url | grep linux-static-x86_64.tar.gz | cut -d '"' -f 4) -O verible.tar.gz
          mkdir -p verible-bin
          tar -xzf verible.tar.gz -C verible-bin --strip-components=1

      - name: Executar RTL Linter
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        run: |
          echo "${{ github.workspace }}/verible-bin/bin" >> $GITHUB_PATH
          export PATH="${{ github.workspace }}/verible-bin/bin:$PATH"
          verible-verilog-lint --version 
          make lint

  # ==========================================
  # JOB 2: SIMULAÇÃO (Unit & Integration)
  # ==========================================
  rtl-simulation:
    name: Verilator Tests
    runs-on: ubuntu-latest
    needs: [changes, rtl-linting]
    container:
      image: verilator/verilator:latest

    steps:
      - name: Bypass Message (If No HW Changes)
        if: ${{ needs.changes.outputs.hardware == 'false' }}
        run: echo "✅ Nenhuma alteração de hardware detectada. Simulação finalizada em bypass."

      - name: Checkout do código
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Ambiente e Dependências (Python)
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        run: |
          git config --global --add safe.directory '*' 
          apt-get update
          apt-get install -y python3 python3-pip python3-venv gcc-riscv64-unknown-elf
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Executar Testes Inteligentes
        if: ${{ needs.changes.outputs.hardware == 'true' }}
        run: .venv/bin/python scripts/smart_test.py

  # ==========================================
  # JOB 3: COMPLIANCE (RV32I E2E)
  # ==========================================
  compliance-verification:
    name: RV32I Compliance (${{ matrix.core }})
    runs-on: ubuntu-latest
    needs: [changes, rtl-simulation]
    
    # 1. Só executa se houver pelo menos um core na matriz
    if: ${{ needs.changes.outputs.run_compliance == 'true' }}
    
    # 2. Clona o Job com base no array JSON gerado no JOB 0
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.changes.outputs.matrix_cores) }}
        
    container:
      image: verilator/verilator:latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Dependências (Toolchain RISC-V)
        run: |
          git config --global --add safe.directory '*'
          apt-get update
          apt-get install -y gcc-riscv64-unknown-elf make

      # 3. Injeta a variável da matriz no Makefile
      - name: Executar Verificação Oficial (100% Compliance Suite)
        run: make test-compliance-all CORE_ARCH=${{ matrix.core }}

      # 4. Salva o artefato com o nome do core que falhou para evitar sobrescrita
      - name: Salvar Logs de Falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-error-traces-${{ matrix.core }}
          path: traces/${{ matrix.core }}/
          retention-days: 5