# =========================================================
# SuperNova-RV Dependency Matrix
# =========================================================

# If any file in a target's list is changed,
# the corresponding test will be executed on pre-commit.

targets:
  alu:
    - hw/core/alu.sv
    - tb/unit/tb_alu.cpp
    - hw/core/supernova_pkg.sv

  reg_file:
    - hw/core/reg_file.sv
    - tb/unit/tb_reg_file.cpp
    # Note that reg_file does not depend on the package (yet)

  fetch_stage:
    - hw/core/fetch_stage.sv
    - tb/unit/tb_fetch_stage.cpp
    - hw/core/pc_reg.sv
    - hw/core/supernova_pkg.sv
  
  imm_gen:
    - hw/core/imm_gen.sv
    - tb/unit/tb_imm_gen.cpp
    - hw/core/supernova_pkg.sv

  lsu:
    - hw/core/lsu.sv
    - tb/unit/tb_lsu.cpp
    - hw/core/supernova_pkg.sv

  branch_unit:
    - hw/core/branch_unit.sv
    - tb/unit/tb_branch_unit.cpp
  
  decode_stage:
    - hw/core/decode_stage.sv
    - tb/unit/tb_decode_stage.cpp
    - hw/core/reg_file.sv
    - hw/core/imm_gen.sv
    - hw/core/supernova_pkg.sv

  execute_stage:
    - hw/core/execute_stage.sv
    - tb/unit/tb_execute_stage.cpp
    - hw/core/alu.sv
    - hw/core/supernova_pkg.sv

  instr_decoder:
    - hw/core/instr_decoder.sv
    - tb/unit/tb_instr_decoder.cpp
    - hw/core/supernova_pkg.sv